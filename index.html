<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario Prenotazioni Cordovado</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="header-image">
    <img src="casa.jpg" alt="Intestazione" />
  </div>

  <h1>Calendario Prenotazioni</h1>

  <div class="calendar-controls">
    <button id="prevMonth">&#9664;</button>   <!-- ◀ -->
    <span id="currentMonth"></span>
    <button id="nextMonth">&#9654;</button>   <!-- ▶ -->
  </div>

  <div id="calendar"></div>

  <form id="bookingForm">
    <label>
      Nome:
      <input type="text" id="name" required />
    </label>

    <label>
      Data inizio:
      <input type="date" id="startDate" required />
    </label>

    <label>
      Data fine:
      <input type="date" id="endDate" required />
    </label>

    <button type="submit">Prenota</button>

    <div id="message"></div>
  </form>

  <div class="extra-buttons">
    <button id="btnList">Elenco prenotazioni</button>
    <button id="btnCopyList">Copia lista</button>

    <button id="btnStats">Statistiche</button>
    <button id="btnCopyStats">Copia statistiche</button>
  </div>

  <div id="listContainer"></div>
  <div id="statsContainer"></div>

  <script src="script.js"></script>

</body>
</html>
