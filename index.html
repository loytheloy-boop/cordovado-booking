<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cordovado Booking</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header>Cordovado Booking</header>

    <!-- HERO IMAGE -->
    <div class="hero"></div>

    <!-- CARD: FORM PRENOTAZIONE -->
    <div class="card">
        <h2>Prenota il tuo soggiorno</h2>

        <label for="name">Nome</label>
        <input type="text" id="name" placeholder="Inserisci il tuo nome">

        <label for="startDate">Data inizio</label>
        <input type="date" id="startDate">

        <label for="endDate">Data fine</label>
        <input type="date" id="endDate" disabled>

        <button id="bookBtn">Prenota</button>
    </div>

    <!-- CARD: CALENDARIO -->
    <div class="card">
        <h2>Calendario disponibilità</h2>
        <div id="calendar" class="calendar"></div>
    </div>

    <!-- CARD: LISTA PRENOTAZIONI -->
    <div class="card">
        <h2>Elenco prenotazioni</h2>
        <button id="loadBookingsBtn">Mostra prenotazioni</button>
        <div id="bookingList"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
